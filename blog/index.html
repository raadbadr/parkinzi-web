      --text-primary: rgb(240, 244, 250);
      --text-secondary: rgb(195, 205, 220);

      --bg-card-hover: rgba(40, 55, 75, 0.85);
      --border-soft: rgba(255, 255, 255, 0.08);

      --shadow-card-hover: 0 12px 36px rgba(86, 173, 255, 0.2);

    }
    body {

      background: var(--bg-page);
      color: var(--text-primary);
      margin: 0;
      min-height: 100vh;
      line-height: 1.6;
    }
    .blog-hero {
      padding: 5rem 1.5rem 3rem;
      text-align: center;
      max-width: 900px;
      margin: 0 auto;
    }
    .blog-hero-logo {
      display: block;
      margin: 0 auto 1.2rem;
      height: clamp(3rem, 7vw, 4.5rem);
      width: auto;
      max-width: min(80vw, 380px);
    }
    .blog-hero h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      margin: 0 0 0.8rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }
    .blog-hero p {
      font-size: 1.05rem;
      color: var(--text-secondary);
      margin: 0;
      max-width: 640px;
      margin-inline: auto;
    }
    .blog-grid {
      max-width: 1180px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 4rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .blog-card {
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-radius: 18px;
      padding: 1.75rem;
      box-shadow: var(--shadow-card);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .blog-card:hover, .blog-card:focus-within {
      transform: translateY(-4px);
      box-shadow: var(--shadow-card-hover);
      background: var(--bg-card-hover);
    }
    .blog-card-date {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .blog-card-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
      line-height: 1.35;
    }
    .blog-card-summary {
      color: var(--text-secondary);
      font-size: 0.96rem;
      margin: 0;
      flex-grow: 1;
    }
    .blog-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.4rem;
    }
    .blog-card-tag {
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 0.3rem 0.7rem;
      border-radius: 999px;
      font-size: 0.78rem;

      font-weight: 700;
      font-size: 0.95rem;
      align-self: flex-start;
      margin-top: 0.5rem;

    .blog-card-read::after {

      margin-inline-start: 0.4rem;
      transition: transform 0.2s ease;
      display: inline-block;
    }

  <script>
    (async function loadPosts() {
      const grid = document.getElementById('blogGrid');
      const loading = document.getElementById('blogLoading');
      try {
        const res = await fetch('/blog/posts.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('failed');
        const posts = await res.json();
        const now = new Date();
        const visible = posts
          .filter(p => new Date(p.publishDate) <= now)
          .sort((a, b) => new Date(b.publishDate) - new Date(a.publishDate));
        if (loading) loading.remove();
        if (visible.length === 0) {
          grid.innerHTML = '<div class="blog-empty">لا توجد منشورات منشورة بعد. تحقق غداً.</div>';
          return;
        }
        const dateFmt = new Intl.DateTimeFormat('ar', { year: 'numeric', month: 'long', day: 'numeric', calendar: 'gregory', numberingSystem: 'latn' });
        const html = visible.map(p => `
          <a href="/blog/${p.slug}.html" class="blog-card" aria-labelledby="title-${p.slug}">
            <span class="blog-card-date">${dateFmt.format(new Date(p.publishDate))}</span>
            <h2 class="blog-card-title" id="title-${p.slug}">${p.title}</h2>
            <p class="blog-card-summary">${p.summary}</p>
            <div class="blog-card-tags">${(p.tags || []).map(t => `<span class="blog-card-tag">${t}</span>`).join('')}</div>
            <span class="blog-card-read">اقرأ المزيد</span>
          </a>
        `).join('');
        grid.insertAdjacentHTML('beforeend', html);
      } catch (err) {
        if (loading) loading.textContent = 'تعذّر تحميل المنشورات.';
      }
    })();
  </script>
