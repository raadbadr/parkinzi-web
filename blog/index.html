  <script>
    (function () {
      var grid = document.getElementById('blogGrid');
      var toolbar = document.getElementById('blogToolbar');
      var searchInput = document.getElementById('blogSearchInput');
      var tagbar = document.getElementById('blogTagbar');

      var fmt = new Intl.DateTimeFormat('ar', {
        year: 'numeric', month: 'long', day: 'numeric',
        calendar: 'gregory', numberingSystem: 'latn',
      });
      var rtf = (typeof Intl.RelativeTimeFormat === 'function')
        ? new Intl.RelativeTimeFormat('ar', { numeric: 'auto' })
        : null;

      function relativeOrAbsolute(d) {
        var diffMs = Date.now() - d.getTime();
        var diffDays = Math.round(diffMs / 86400000);
        if (rtf && Math.abs(diffDays) <= 30) {
          if (diffDays === 0) return 'اليوم';
          if (diffDays === 1) return 'أمس';
          return rtf.format(-diffDays, 'day');
        }
        return fmt.format(d);
      }

      function ensureCovers() {
        return new Promise(function (resolve) {
          if (window.parkinziBuildCover) return resolve();
          var t0 = Date.now();
          var iv = setInterval(function () {
            if (window.parkinziBuildCover || Date.now() - t0 > 1500) {
              clearInterval(iv); resolve();
            }
          }, 30);
        });
      }

      function escape(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function buildCard(p, featured) {
        var cover = window.parkinziBuildCover
          ? window.parkinziBuildCover(p.slug, p.tags || [])
          : '<div class="blog-card-cover"></div>';
        var tagsHtml = (p.tags || []).slice(0, 3).map(function (t) {
          return '<span class="blog-card-tag">' + escape(t) + '</span>';
        }).join('');
        var publishDate = new Date(p.publishDate);
        var dateText = relativeOrAbsolute(publishDate);
        var read = p.readMinutes
          ? ' · قراءة ' + (p.readMinutes === 1 ? 'دقيقة واحدة' : p.readMinutes === 2 ? 'دقيقتان' : (p.readMinutes <= 10 ? p.readMinutes + ' دقائق' : p.readMinutes + ' دقيقة'))
          : '';
        var featuredBadge = featured ? '<span class="blog-card-featured-tag">مميّز</span>' : '';
        var cls = 'blog-card' + (featured ? ' blog-card--featured' : '');
        return ''
          + '<a href="/blog/' + p.slug + '.html" class="' + cls + '" aria-labelledby="t-' + p.slug + '">'
          + cover + featuredBadge
          + '  <div class="blog-card-body">'
          + '    <span class="blog-card-date"><time datetime="' + p.publishDate.slice(0, 10) + '">' + escape(dateText) + '</time>' + escape(read) + '</span>'
          + '    <h2 class="blog-card-title" id="t-' + p.slug + '">' + escape(p.title) + '</h2>'
          + '    <p class="blog-card-summary">' + escape(p.summary) + '</p>'
          + '    <div class="blog-card-tags">' + tagsHtml + '</div>'
          + '  </div>'
          + '</a>';
      }

      var state = { all: [], query: '', tag: '' };

      function render() {
        var q = state.query.trim().toLowerCase();
        var filtered = state.all.filter(function (p) {
          if (state.tag && (p.tags || []).indexOf(state.tag) === -1) return false;
          if (q) {
            var hay = (p.title + ' ' + p.summary + ' ' + (p.tags || []).join(' ')).toLowerCase();
            if (hay.indexOf(q) === -1) return false;
          }
          return true;
        });

        if (!filtered.length) {
          grid.innerHTML = '<div class="blog-empty">لا توجد نتائج. جرّب كلمة أخرى أو وسماً مختلفاً.</div>';
          return;
        }

        var html = '';
        // Pick first as featured only when no filter is active
        if (!state.tag && !q) {
          html += buildCard(filtered[0], true);
          for (var i = 1; i < filtered.length; i++) html += buildCard(filtered[i], false);
        } else {
          for (var j = 0; j < filtered.length; j++) html += buildCard(filtered[j], false);
        }
        grid.innerHTML = html;
      }

      function renderTagbar() {
        var counts = {};
        state.all.forEach(function (p) {
          (p.tags || []).forEach(function (t) { counts[t] = (counts[t] || 0) + 1; });
        });
        var top = Object.keys(counts).sort(function (a, b) { return counts[b] - counts[a]; }).slice(0, 6);
        var html = '<button type="button" data-tag="" class="' + (state.tag === '' ? 'is-active' : '') + '">الكل</button>';
        top.forEach(function (t) {
          html += '<button type="button" data-tag="' + escape(t) + '" class="' + (state.tag === t ? 'is-active' : '') + '">' + escape(t) + '</button>';
        });
        tagbar.innerHTML = html;
        tagbar.querySelectorAll('button').forEach(function (btn) {
          btn.addEventListener('click', function () {
            state.tag = btn.dataset.tag || '';
            tagbar.querySelectorAll('button').forEach(function (b) { b.classList.toggle('is-active', b.dataset.tag === state.tag); });
            render();
          });
        });
      }

      function handleUrlTag() {
        var p = new URLSearchParams(location.search);
        var t = p.get('tag');
        if (t) state.tag = t;
      }

      (function init() {
        fetch('/blog/posts.json', { cache: 'no-cache' })
          .then(function (r) {
            if (!r.ok) throw new Error('failed');
            return r.json();
          })
          .then(function (posts) {
            return ensureCovers().then(function () { return posts; });
          })
          .then(function (posts) {
            var now = new Date();
            state.all = posts
              .filter(function (p) { return new Date(p.publishDate) <= now; })
              .sort(function (a, b) {
                var fa = a.featured ? 1 : 0;
                var fb = b.featured ? 1 : 0;
                if (fa !== fb) return fb - fa;
                return new Date(b.publishDate) - new Date(a.publishDate);
              });
            handleUrlTag();
            toolbar.hidden = false;
            renderTagbar();
            render();
            searchInput.addEventListener('input', function () {
              state.query = searchInput.value;
              render();
            });
          })
          .catch(function () {
            grid.innerHTML = '<div class="blog-empty">تعذّر تحميل المنشورات. <a href="/blog/feed.xml" style="color:var(--primary)">جرّب RSS</a> أو حدّث الصفحة.</div>';
          });
      })();
    })();
  </script>
