name: Daily Blog Post

# Generates and commits one blog post per day via Claude (with web search),
# then regenerates sitemap.xml + blog/feed.xml. Cloudflare Pages picks up
# the push and deploys automatically.

on:
  # Runs at 07:00 UTC = 10:00 Asia/Riyadh.
  schedule:
    - cron: '0 7 * * *'
  # Allow manual trigger from the Actions tab (useful for testing).
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-blog-post
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Opt into Node 24 for JS-based actions so we don't get bitten by the
      # June 2026 forced switch.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Verify ANTHROPIC_API_KEY is wired up
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is empty or not exposed to this workflow."
            echo "Check:"
            echo "  1) Settings → Secrets and variables → Actions → 'Repository secrets' tab"
            echo "  2) Name MUST be exactly: ANTHROPIC_API_KEY"
            echo "  3) Value must not be empty"
            exit 1
          fi
          echo "OK — secret is set. Length: ${#ANTHROPIC_API_KEY} chars."
          # Sanity-check the prefix (Anthropic keys start with 'sk-ant-')
          case "$ANTHROPIC_API_KEY" in
            sk-ant-*) echo "Prefix looks correct (sk-ant-...)" ;;
            *) echo "::warning::Key does not start with 'sk-ant-'. Make sure you copied an Anthropic key, not an OpenAI/other key." ;;
          esac

      - name: Generate daily post
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Default to Haiku 4.5 — ~5x cheaper than Sonnet at blog quality.
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-haiku-4-5' }}
          # Web search OFF by default — it's >80% of the per-run cost. Haiku
          # writes strong evergreen posts from its own training. Set this to
          # 1+ via repo vars when you specifically want fresh news.
          WEB_SEARCH_USES: ${{ vars.WEB_SEARCH_USES || '0' }}
          MAX_TOKENS: ${{ vars.MAX_TOKENS || '3500' }}
        run: node generate-daily-post.js

      - name: Regenerate sitemap and feed
        working-directory: scripts
        run: node regen-sitemap-feed.js

      - name: Commit and push
        run: |
          git config user.name  "PARKINZI Blog Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Blog: auto-publish daily post ($(date -u +%Y-%m-%d))"
          git push
