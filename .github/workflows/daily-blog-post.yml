name: Daily Blog Post

# Generates and commits one blog post per day via Claude (with web search),
# then regenerates sitemap.xml + blog/feed.xml. Cloudflare Pages picks up
# the push and deploys automatically.

on:
  # Runs at 07:00 UTC = 10:00 Asia/Riyadh.
  schedule:
    - cron: '0 7 * * *'
  # Allow manual trigger from the Actions tab (useful for testing).
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-blog-post
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Opt into Node 24 for JS-based actions so we don't get bitten by the
      # June 2026 forced switch.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Generate daily post
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Default to Haiku 4.5 — ~5x cheaper than Sonnet at blog quality.
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-haiku-4-5' }}
          # 1 web search per run keeps cost low; bump via repo var if needed.
          WEB_SEARCH_USES: ${{ vars.WEB_SEARCH_USES || '1' }}
          MAX_TOKENS: ${{ vars.MAX_TOKENS || '4000' }}
        run: node generate-daily-post.js

      - name: Regenerate sitemap and feed
        working-directory: scripts
        run: node regen-sitemap-feed.js

      - name: Commit and push
        run: |
          git config user.name  "PARKINZI Blog Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Blog: auto-publish daily post ($(date -u +%Y-%m-%d))"
          git push
