name = "parkinzi"
compatibility_date = "2026-02-17"
main = "src/worker.js"

[assets]
directory = "./"
# Expose the assets binding to the Worker. Without this line env.ASSETS is
# undefined inside the Worker (static pages still serve because Cloudflare
# answers asset-matching requests before the Worker runs) — which silently
# broke every MCP tool that reads blog content.
binding = "ASSETS"
